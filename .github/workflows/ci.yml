# Integración continua (Sprint 2 / despliegue_proyecto.txt). CD a Render se puede añadir después.
name: CI logistica-auth

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Maven verify
        run: ./mvnw -ntp -B verify
