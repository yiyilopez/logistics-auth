spring.application.name=logistica-auth
spring.profiles.active=prod

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Database
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:/db/migration

# CORS
spring.web.cors.allowedOrigins=https://logistics-fronting-web.vercel.app
spring.web.cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowedHeaders=*
spring.web.cors.allowCredentials=true

# JWT
app.jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
app.jwt.expiration=86400000
