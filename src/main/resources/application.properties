spring.application.name=logistica-auth
server.port=${PORT:8080}

# PostgreSQL (Render desde tu PC: exporta SPRING_DATASOURCE_* y APP_JWT_SECRET; URL externa con ?sslmode=require)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistica_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logistica}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logistica}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (HS256) — mínimo 32 bytes; en producción usar variable JWT_SECRET (puede ser Base64 o texto largo)
app.jwt.secret=${APP_JWT_SECRET:30CB2BC0F0F0DDE92B2CC1E9A06B3734}
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7
