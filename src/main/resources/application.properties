spring.application.name=logistica-auth
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/logistica_auth
spring.datasource.username=logistica
spring.datasource.password=logistica
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (HS256) — mínimo 32 bytes; en producción usar variable JWT_SECRET (puede ser Base64 o texto largo)
app.jwt.secret=30CB2BC0F0F0DDE92B2CC1E9A06B3734
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7
